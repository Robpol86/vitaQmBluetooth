name: Install clang-format and clang-tidy
description: Install all clang tools.


inputs:
  version:
    description: The version of clang tools to install.
    required: true

runs:
  using: composite
  steps:

    - name: Install clang tools (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euxo pipefail
        curl -LSSf https://apt.llvm.org/llvm.sh |sudo bash -s -- "${{ inputs.version }}" all
        for name in clang clang++ clang-format clang-tidy llvm-cov; do
          sudo update-alternatives --install "/usr/bin/$name" "$name" "/usr/bin/$name-${{ inputs.version }}" 999
        done

    - name: Install clang tools (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euxo pipefail
        brew install llvm@${{ inputs.version }}
        brew link --force llvm@${{ inputs.version }}

    - name: Confirm installed
      shell: bash
      run: |
        set -euxo pipefail
        clang-format --version
        clang-tidy --version
