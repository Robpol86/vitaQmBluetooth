name: Install Vita SDK
description: Install the Vita SDK and its dependencies.


inputs:
  os:
    description: Runner OS (e.g. ubuntu-latest or macos-latest).
    required: true
  vitasdk-path:
    description: Destination directory where the Vita SDK will be installed.
    required: false
    default: ${{ runner.tool_cache }}/vitasdk


runs:
  using: composite
  steps:

    - name: Install dependencies (macOS)
      if: inputs.os == 'macos-latest'
      shell: bash
      run: brew install zstd

    - name: Install dependencies (Ubuntu)
      if: inputs.os == 'ubuntu-latest'
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y cmake

    - name: Add persistent VITASDK to ENV and PATH
      shell: bash
      run: |
        set -euxo pipefail
        echo "VITASDK=${{ inputs.vitasdk-path }}" >> "$GITHUB_ENV"
        echo "${{ inputs.vitasdk-path }}/bin" >> "$GITHUB_PATH"

    - name: Install the Vita SDK
      shell: bash
      run: |
        set -euxo pipefail
        git -C "$RUNNER_TEMP" clone --depth 1 "https://github.com/vitasdk/vdpm"
        cd "$RUNNER_TEMP/vdpm"
        until bash -exo pipefail ./bootstrap-vitasdk.sh; do sleep 10; done
        until bash -exo pipefail ./install-all.sh; do sleep 10; done
        cd .. && rm -rf vdpm

    - name: Post-install workarounds (macOS)
      if: inputs.os == 'macos-latest'
      shell: bash
      run: |
        set -euxo pipefail
        ln -s /opt/homebrew/opt/zstd/lib/libzstd.1.dylib /usr/local/opt/zstd/lib/libzstd.1.dylib
