name: Release
run-name: "${{ format('{0} [{1}]', inputs.release_version, github.ref_name) }}"

concurrency:
  cancel-in-progress: true
  group: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version (e.g. 1.2.3)
        required: true
        type: string

jobs:

  Version:
    # TODOs:
    # + Assert release_version matches /^v?[0-9]+[.][0-9]+[.][0-9]+$/
    # + Save sanitized (sans ^v, 0.001.1 -> 0.1.1) to workflow variable
    # + Save generated release title to another workflow variable
    # - Assert new version is consecutive increment of last version in CMakeLists.txt (awk decrement + match)
    runs-on: ubuntu-latest
    steps:
      - name: Validate version
        id: validate-version
        env:
          INPUT_VERSION: "${{ inputs.release_version }}"
        run: |
          set -euxo pipefail
          if [[ ! "$INPUT_VERSION" =~ ^v?([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "Invalid version: $INPUT_VERSION"
            exit 1
          fi
          awk -v MAJOR="${BASH_REMATCH[1]}" -v MINOR="${BASH_REMATCH[2]}" -v PATCH="${BASH_REMATCH[3]}" '
            BEGIN {
              printf("VERSION=%d.%d.%d\n", int(MAJOR), int(MINOR), int(PATCH))
            }
          ' |tee -a "$GITHUB_OUTPUT" |tee -a "$GITHUB_ENV"
      - name: Generate title
        id: generate-title
        run: |
          set -euxo pipefail
          echo "TITLE=v$VERSION [$(date +%Y-%m-%d)]" |tee -a "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate consecutive version
        run: |
          set -euxo pipefail
          [[ "$VERSION" =~ ^v?([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]
          awk \
            -v MAJOR="${BASH_REMATCH[1]}" -v MINOR="${BASH_REMATCH[2]}" -v PATCH="${BASH_REMATCH[3]}" \
            -f consecutive-check.awk < ./CMakeLists.txt
    outputs:
      TITLE: "${{ steps.generate-title.outputs.TITLE }}"
      VERSION: "${{ steps.validate-version.outputs.VERSION }}"

  Bump:
    # - Generate new changelog in place and upload as artifact
    # - Set new version in /CMakeLists.txt
    # - Commit and push
    # - Wait for CI to build artifacts (assert)
    # - Download them and re-upload them here for subsequent job
    # - Upload redist assets as workflow artifacts
    needs: Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: TODO
        run: echo TODO

  Release:
    # TODOs:
    # - Isolate install section from README between anchors into temporary file, upload as workflow artifact
    # - Download artifacts from workflow
    # - Create release with all files and body
    needs: Bump
    runs-on: ubuntu-latest
    steps:
      - name: TODO
        run: echo TODO

