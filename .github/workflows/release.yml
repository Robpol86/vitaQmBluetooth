name: Release
run-name: "${{ format('{0} [{1}]', inputs.release_version, github.ref_name) }}"

concurrency:
  cancel-in-progress: true
  group: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version (e.g. 1.2.3)
        required: true
        type: string

env:
  EXPECTED_FILES: |
    cl_section.md
    install.md
    release/module_kernel/vitaQmBluetooth.skprx
    release/module_user/vitaQmBluetooth.suprx
    redist/quickmenureborn/QuickMenuReborn.suprx
    redist/quickmenureborn/qmr_plugin.rco

jobs:

  Collect:
    #
    # Isolate the changelog section and install section into their own files.
    #
    runs-on: ubuntu-latest
    env:
      INPUT_VERSION: "${{ inputs.release_version }}"
    steps:
      - name: Validate input
        id: validate-input
        run: |
          set -euxo pipefail
          if [[ ! "$INPUT_VERSION" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Invalid version: $INPUT_VERSION" >&2
            exit 1
          fi
      - name: Checkout
        uses: actions/checkout@v6
      - name: Get changelog section
        run: |
          set -euxo pipefail
          if ! top_section="$(grep -Pom1 '^## \[[0-9]+[.][0-9]+[.][0-9]+\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$' CHANGELOG.md)"; then
            echo "::error::Invalid CHANGELOG.md: top section not found" >&2
            exit 1
          fi
          if ! echo "$top_section" |grep -P "(?<=[)$INPUT_VERSION(?=])"; then
            echo "::error::Version mismatch (cl): '$INPUT_VERSION' not in '$top_section'" >&2
            exit 1
          fi
          awk -v top_section="$top_section" '
            BEGIN { in_section=0 }
            $0 == top_section { in_section=1; next }
            /^## \[/ { in_section=0 }
            in_section { print }
          ' CHANGELOG.md |tee cl_section.md
      - name: Verify version in CMakeLists.txt
        run: |
          set -euxo pipefail
          if ! project_line="$(grep -Pm1 '^\s*project\(.+ VERSION [0-9.]+(?=[^0-9.])' CMakeLists.txt)"; then
            echo "::error::Invalid CMakeLists.txt: project line not found" >&2
            exit 1
          fi
          if ! echo "$project_line" |grep -P "(?<=VERSION )$INPUT_VERSION(?=[^0-9.])"; then
            echo "::error::Version mismatch (cm): '$INPUT_VERSION' not in '$project_line'" >&2
            exit 1
          fi
      - name: Get install section
        run: |
          set -euxo pipefail
          awk -v begin_marker="INSTALL-BEGIN" -v end_marker="INSTALL-END" '
            BEGIN { in_section=0 }
            $0 ~ begin_marker { in_section=1; next }
            $0 ~ end_marker { in_section=0 }
            in_section { print }
          ' README.md |tee install.md
      - name: Get run-id of commit
        id: get-run-id
        uses: actions/github-script@v9
        with:
          github-token: "${{ secrets.GHA_SECRET_TOKEN }}"  # TODO remove
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ci.yml",
              status: "success",
              head_sha: context.sha,
            });
            if (!data.workflow_runs.length) {
              core.setFailed(`No successful ci.yml run found for ${context.sha}`);
              return;
            }
            const run = data.workflow_runs[0];
            core.setOutput("RUN_ID", run.id);
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: release
          path: release
          run-id: ${{ steps.get-run-id.outputs.RUN_ID }}
          github-token: "${{ secrets.GHA_SECRET_TOKEN }}"  # TODO remove
      - name: Validate all files
        run: |
          set -euxo pipefail
          printenv EXPECTED_FILES |xargs ls -lah
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: collected
          if-no-files-found: error
          path: ${{ env.EXPECTED_FILES }}

  Release:
    # TODOs:
    # - Download the four+2 artifacts from workflow
    # - Create release with all files and body
    # - If releasing from non-main: prerelease
    needs: Collect
    runs-on: ubuntu-latest
    env:
      NEW_TAG: "v${{ inputs.release_version }}"
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: collected
      - name: Prepare
        id: prepare
        run: |
          set -euxo pipefail
          echo "TITLE=$NEW_TAG [$(date +%Y-%m-%d)]" |tee -a "$GITHUB_OUTPUT"
          {
            echo "## Changelog"
            cat cl_section.md
            echo
            echo "## Install"
            cat install.md
          } |tee release_body.md
      - name: Create Release
        id: create-release
        uses: actions/github-script@v9
        env:
          RELEASE_TITLE: "${{ steps.prepare.outputs.TITLE }}"
        with:
          script: |
            const fs = require("fs");
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.NEW_TAG,
              target_commitish: context.sha,
              name: process.env.RELEASE_TITLE,
              body: fs.readFileSync("release_body.md"),
            });
            core.setOutput("RELEASE_ID", release.id);
            core.info(`Created release: ${release.html_url}`);
      - name: Upload release assets
        uses: actions/github-script@v9
        env:
          RELEASE_ID: "${{ steps.create-release.outputs.RELEASE_ID }}"
        with:
          script: |
            const fs = require("fs");
            const files = process.env.EXPECTED_FILES.split("\n")
              .map(line => line.trim())
              .filter(Boolean);
            for (const file of files) {
              const name = path.basename(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: process.env.RELEASE_ID,
                name,
                data: fs.readFileSync(file),
              });
              core.info(`Uploaded ${name}`);
            }
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release_body
          if-no-files-found: error
          path: release_body.md

