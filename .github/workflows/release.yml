name: Release
run-name: "${{ format('{0} [{1}]', inputs.release_version, github.ref_name) }}"

concurrency:
  cancel-in-progress: true
  group: release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Version (e.g. 1.2.3)
        required: true
        type: string

jobs:

  Validate:
    #
    # Validate and normalize the inputted version, and generate the release datestamp.
    #
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        id: validate-input
        env:
          INPUT_VERSION: "${{ inputs.release_version }}"
        run: |
          set -euxo pipefail
          if [[ ! "$INPUT_VERSION" =~ ^v?([0-9]+)[.]([0-9]+)[.]([0-9]+)$ ]]; then
            echo "::error::Invalid version: $INPUT_VERSION" >&2
            exit 1
          fi
          awk -v MAJOR="${BASH_REMATCH[1]}" -v MINOR="${BASH_REMATCH[2]}" -v PATCH="${BASH_REMATCH[3]}" '
            BEGIN {
              printf("VERSION=%d.%d.%d\n", int(MAJOR), int(MINOR), int(PATCH))
            }
          ' |tee -a "$GITHUB_OUTPUT" |tee -a "$GITHUB_ENV"
      - name: Save date
        id: save-date
        run: |
          set -euxo pipefail
          date +DATE=%Y-%m-%d |tee -a "$GITHUB_OUTPUT"
      - name: Checkout
        uses: actions/checkout@v6
      - name: Validate version
        id: validate-version
        run: |
          set -euxo pipefail
          old_version="$(grep -Pom1 "VERSION \K[0-9.]+(?=.+Version automatically set by release.yml)" CMakeLists.txt)"
          if [[ ! "$old_version" =~ ^[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "::error::Invalid old_version: $old_version" >&2
            exit 1
          fi
          if ! dpkg --compare-versions "$VERSION" gt "$old_version"; then
            echo "::error::New version $VERSION must be greater than older version $old_version" >&2
            exit 1
          fi
          echo "OLD_VERSION=$old_version" |tee -a "$GITHUB_OUTPUT"
    outputs:
      DATE: "${{ steps.save-date.outputs.DATE }}"
      NEW_VERSION: "${{ steps.validate-input.outputs.VERSION }}"
      OLD_VERSION: "${{ steps.validate-version.outputs.OLD_VERSION }}"

  Changelog:
    #
    # Generate the changelog for the release.
    #
    needs: Validate
    runs-on: ubuntu-latest
    env:
      DATE: "${{ needs.Validate.outputs.DATE }}"
      NEW_VERSION: "${{ needs.Validate.outputs.NEW_VERSION }}"
      OLD_VERSION: "${{ needs.Validate.outputs.OLD_VERSION }}"
      NEW_TAG: "v${{ needs.Validate.outputs.NEW_VERSION }}"
      OLD_TAG: "v${{ needs.Validate.outputs.OLD_VERSION }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # for git log
      - name: Validate
        run: |
          set -euxo pipefail
          if git tag |grep -q "$NEW_TAG"; then
            echo "::error::Tag $NEW_TAG already exists" >&2
            exit 1
          fi
          if ! git tag |grep -q "$OLD_TAG"; then
            echo "::warning::Old tag $OLD_TAG not found, initial commit" >&2
          fi
      - name: Git Log
        id: git_log
        run: |
          set -euxo pipefail
          # TODO if no last_tag: Initial Commit
          {
            echo "GIT_LOG<<EOFEOFEOF"
            git log --pretty="* %h %s" "$OLD_TAG..HEAD" |tee cl_body.md
            echo EOFEOFEOF
          } |tee -a "$GITHUB_OUTPUT"
      - name: Generate Changelog Entry
        env:
          TITLE: "[${{ env.NEW_VERSION }}] - ${{ env.DATE }}"
        run: |
          set -euxo pipefail
          test -n "$TITLE"
          {
            echo "## [$NEW_VERSION]"
            echo
            echo "$TITLE"
            echo
            cat cl_body.md
            echo
          } |tee cl_entry.md


  Bump:
    # - Prepend new changelog section to CHANGELOG.md
    # - Set new version in /CMakeLists.txt
    # - Commit changes to both files and push
    # - Wait for CI to build artifacts
    # - Download release artifacts (2 files) and re-upload them here for subsequent job
    # - Upload redist assets (2 files) as workflow artifacts
    needs: [Validate, Changelog]
    runs-on: ubuntu-latest
    env:
      DATE: "${{ needs.Validate.outputs.DATE }}"
      NEW_VERSION: "${{ needs.Validate.outputs.NEW_VERSION }}"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: TODO
        run: echo TODO

  Release:
    # TODOs:
    # - Isolate install section from README between anchors into temporary file, upload as workflow artifact
    # - Download the four artifacts from workflow
    # - Create release with all files and body
    needs: Bump
    runs-on: ubuntu-latest
    steps:
      - name: TODO
        run: echo TODO

