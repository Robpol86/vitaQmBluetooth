name: CI

on:
  pull_request:
  push:

jobs:
  BuildTestLint:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vita SDK
        uses: ./.github/actions/vitasdk

      - name: Install dependencies
        env:
          LLVM_VERSION: "22"
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl gnupg lsb-release software-properties-common wget
          curl -LSSf https://apt.llvm.org/llvm.sh |bash -s -- "$LLVM_VERSION"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-release
          path: build-release/deplayenabler.suprx
          if-no-files-found: error

      - name: Upload debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-debug
          path: build-debug/deplayenabler.suprx
          if-no-files-found: error
