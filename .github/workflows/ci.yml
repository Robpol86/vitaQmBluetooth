name: CI

on:
  pull_request:
  push:

jobs:
  TestLintBuild:
    runs-on: ubuntu-latest
    container: vitasdk/vitasdk:latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: apk add --no-cache clang-extra-tools

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-release
          path: build-release/deplayenabler.suprx
          if-no-files-found: error

      - name: Upload debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-debug
          path: build-debug/deplayenabler.suprx
          if-no-files-found: error
