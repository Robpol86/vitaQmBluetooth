name: CI

on:
  pull_request:
  push:

jobs:
  BuildTestLint:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-lates]
    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Vita SDK
        uses: ./.github/actions/vitasdk

      - name: Install clang tools
        uses: ./.github/actions/clang
        with:
          version: "22"

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-release
          path: build-release/deplayenabler.suprx
          if-no-files-found: error

      - name: Upload debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: deplayenabler-debug
          path: build-debug/deplayenabler.suprx
          if-no-files-found: error
