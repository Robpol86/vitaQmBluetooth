name: CI

on:
  pull_request:
  push:

jobs:
  BuildTestLint:
    strategy:
      matrix:
        os: [&artifact_os ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Dependencies
        uses: ./.github/actions/deps

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Lint
        run: make lint

      - name: Upload release artifact
        env:
          artifact_os: *artifact_os
        if: matrix.os == env.artifact_os
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: build-release/module_*/*.s?prx
          if-no-files-found: error

      - name: Upload debug artifact
        env:
          artifact_os: *artifact_os
        if: matrix.os == env.artifact_os
        uses: actions/upload-artifact@v7
        with:
          name: debug
          path: build-debug/module_*/*.s?prx
          if-no-files-found: error
